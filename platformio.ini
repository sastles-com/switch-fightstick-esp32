[platformio]
default_envs = atoms3_arduino

[env:atoms3_arduino]
platform = espressif32
framework = arduino
board = m5stack-atoms3

monitor_speed = 115200
upload_protocol = esptool
upload_speed = 460800

build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DBOARD_HAS_PSRAM

lib_deps =
	m5stack/M5Unified @ ^0.2.13

